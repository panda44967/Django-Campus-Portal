<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園投票系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #f0e8ff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.4em; color: #222; margin-bottom: 10px; }
        h2 { font-size: 1.15em; color: #333; margin-bottom: 8px; }
        h3 { font-size: 1.05em; color: #444; margin-bottom: 4px; }
        nav { display: flex; gap: 8px; }
        nav a {
            padding: 5px 16px;
            background: #e8e8e8;
            border-radius: 20px;
            text-decoration: none;
            color: #444;
            font-size: 0.9em;
        }
        nav a:hover { background: #d0d0d0; }
        ul { padding-left: 20px; margin: 6px 0; }
        ol { padding-left: 20px; margin: 6px 0; }
        li { margin: 3px 0; font-size: 0.93em; }
        .tag { font-size: 0.82em; color: #888; }
        .badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 1px 7px;
            border-radius: 10px;
            background: #e6f4ea;
            color: #2d6a4f;
            margin-left: 6px;
        }
        .badge-closed { background: #fce8e6; color: #c0392b; }
        a { color: #5566dd; text-decoration: none; }
        a:hover { text-decoration: underline; }
        footer { text-align: center; font-size: 0.78em; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <h1>校園投票系統</h1>
        <nav>
            <a href="{% url 'polls:home' %}">首頁</a>
            <a href="{% url 'polls:stats' %}">統計頁</a>
        </nav>
    </div>

    {% block content %}{% endblock %}

</div>
<footer>All pages reuse the same navigation through base.html.</footer>
</body>
</html>
