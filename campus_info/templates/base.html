<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Activity Info Station</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #f0e8ff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 820px; margin: 0 auto; }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .rendered-at { font-size: 0.78em; color: #999; margin-bottom: 10px; }
        h1 { font-size: 1.5em; color: #222; margin-bottom: 4px; }
        .subtitle { font-size: 0.9em; color: #666; margin-bottom: 14px; }
        nav { display: flex; flex-wrap: wrap; gap: 6px; }
        nav a {
            padding: 5px 14px;
            background: #e8e8e8;
            border-radius: 20px;
            text-decoration: none;
            color: #444;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        nav a:hover { background: #d0d0d0; }
        h2 { font-size: 1.2em; color: #333; margin-bottom: 6px; }
        h3 { font-size: 1.05em; color: #444; margin-bottom: 4px; }
        ul { padding-left: 20px; margin: 4px 0; }
        li { margin: 3px 0; font-size: 0.95em; }
        footer { text-align: center; font-size: 0.78em; color: #aaa; margin-top: 30px; padding-bottom: 20px; }
        .badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            background: #eef;
            color: #556;
            margin-left: 6px;
        }
        .badge-online { background: #e6f4ea; color: #2d6a4f; }
        .tag { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <p class="rendered-at">Rendered at {% now "DATETIME_FORMAT" %}</p>
        <h1>Campus Activity Info Station</h1>
        <p class="subtitle">A Chapter 4-style Django demo focused on views, templates, named URLs, and context data.</p>
        <nav>
            <a href="{% url 'campus:home' %}">Home</a>
            <a href="{% url 'campus:clubs' %}">Clubs</a>
            <a href="{% url 'campus:schedule' %}">Schedule</a>
            <a href="{% url 'campus:faq' %}">FAQ</a>
            <a href="{% url 'campus:about' %}">About</a>
        </nav>
    </div>

    {% block content %}{% endblock %}

</div>
<footer>All pages reuse the same navigation through base.html.</footer>
</body>
</html>
